# Production: без монтирования исходников, только образ + Postgres.
# Скопируйте .env.example в .env и задайте SECRET_KEY и пароли БД.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coreops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-coreops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coreops} -d ${POSTGRES_DB:-coreops}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-coreops}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-coreops}
      DEBUG: ${DEBUG:-false}
      APP_ENV: production
    volumes:
      - api_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  api_storage:
