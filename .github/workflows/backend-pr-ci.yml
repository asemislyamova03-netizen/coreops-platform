name: Backend PR CI

"on":
  pull_request:
    branches: [main]

concurrency:
  group: backend-pr-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coreops
          POSTGRES_PASSWORD: coreops
          POSTGRES_DB: coreops_pr_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coreops -d coreops_pr_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      # Ephemeral CI service DB only — not production
      DATABASE_URL: postgresql+psycopg://coreops:coreops@localhost:5432/coreops_pr_ci
      SECRET_KEY: ci-local-test-secret-not-for-production
      APP_ENV: test
      SEED_ON_STARTUP: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Alembic single-head check
        run: |
          set -euo pipefail
          heads="$(alembic heads)"
          echo "$heads"
          head_count="$(alembic heads | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$head_count" != "1" ]; then
            echo "Expected exactly one Alembic head, found $head_count"
            exit 1
          fi

      - name: Apply migrations to CI database
        run: alembic upgrade head

      - name: Minimal stable pytest regression
        run: |
          pytest -q \
            tests/test_process_overlay_e1a_models.py \
            tests/test_process_overlay_e1a_publication.py \
            tests/test_process_overlay_e1b_models.py \
            tests/test_process_overlay_e1b_runs.py \
            tests/test_workflows.py \
            tests/test_migration_0019_process_overlay_e1a.py \
            tests/test_migration_0020_process_overlay_e1b.py \
            tests/test_tenants.py
