name: Publish approved Telegram content

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 17 * * *"

permissions:
  contents: write

concurrency:
  group: telegram-content-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install publisher dependencies
        run: python -m pip install pyyaml requests python-dateutil

      - name: Publish due Telegram posts
        id: publisher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/content/publish_telegram.py

      - name: Commit publication state
        if: ${{ always() && !cancelled() }}
        shell: bash
        run: |
          if git diff --quiet -- 'landing/content/content-packs/*/pack.yml' 'landing/content/content-packs/*/publish_log.yml'; then
            echo "No publication state changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- 'landing/content/content-packs/*/pack.yml' 'landing/content/content-packs/*/publish_log.yml'
          git commit -m "Publish approved Telegram content"
          git push
