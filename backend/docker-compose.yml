services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coreops
      POSTGRES_PASSWORD: coreops
      POSTGRES_DB: coreops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreops -d coreops"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://coreops:coreops@db:5432/coreops
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-change-in-production
    volumes:
      - ./app:/app/app
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
